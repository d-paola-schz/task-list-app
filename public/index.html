<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Task List App</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark px-3">
  <span class="navbar-brand">ToDo List</span>
</nav>

<div class="container mt-4">
  <div class="card p-3 mb-3">
    <h5>Create Task</h5>

    <label>Title:</label>
    <input id="title" class="form-control mb-2" placeholder="e.g. Homework 1">

    <label>Description:</label>
    <input id="description" class="form-control mb-2" placeholder="Put some description here...">

    <label>Priority:</label>
    <select id="priority"  class="form-control mb-2">
    <option value="Low">Low</option>
    <option value="Medium">Medium</option>
    <option value="High">High</option>
    </select>

    <label>Due date: </label>
    <input id="due_date" type="date" class="form-control mb-3">

    <button class="btn btn-primary" onclick="createTask()">
      Add Task
    </button>
  </div>
  
  <div id="taskList"></div>

  </div>

<script src="app.js"></script>
</body>
</html>
